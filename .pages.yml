media:
  input: public/uploads
  output: /uploads

content:
  - name: sessions
    label: Sessions
    type: collection
    path: src/content/sessions
    filename: "{fields.title}.md"
    fields:
      - name: title
        label: Title
        type: string
        required: false
      - name: locationName
        label: Location Name
        type: string
        required: true
      - name: address
        label: Address
        type: string
        required: true
      - name: googleMapsLink
        label: Google Maps Link
        type: string
        required: false
      - name: latitude
        label: Latitude
        type: number
      - name: longitude
        label: Longitude
        type: number
      - name: alerts
        label: Alerts Line
        type: text
        required: true
      - name: generalInfo
        label: General Info
        type: rich-text
        required: false
      - name: recurrenceType
        label: Recurrence Type
        type: select
        required: true
        options:
          values: [single, date-list, rrule]
      - name: startDateTime
        label: Start Date Time
        type: date
      - name: endDateTime
        label: End Date Time
        type: date
      - name: timezone
        label: Timezone
        type: string
        default: America/New_York
      - name: category
        label: Category
        type: select
        options:
          values: [irish-session, ceili, concert, workshop]
      - name: description
        label: Description
        type: text
      - name: draft
        label: Draft
        type: boolean
      - name: body
        label: Body
        type: rich-text
